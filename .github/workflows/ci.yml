name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared-types
        run: npm run build:shared

      - name: Lint
        run: npm run lint || true

      - name: Typecheck shared types
        run: cd packages/shared-types && npm run typecheck || true

      - name: Typecheck API
        run: cd apps/api && npm run typecheck || true

      - name: Typecheck Worker
        run: cd apps/worker && npm run typecheck || true

      - name: Typecheck Web
        run: cd apps/web && npm run typecheck || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared-types
        run: npm run build:shared

      - name: Run API tests
        run: cd apps/api && npm test || echo "No tests configured yet"
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared-types
        run: npm run build:shared

      - name: Build API
        run: cd apps/api && npm run build || true

      - name: Build Worker
        run: cd apps/worker && npm run build || true

      - name: Build Web
        run: cd apps/web && npm run build || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0

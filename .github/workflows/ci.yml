name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared-types
        run: npm run build:shared

      - name: Lint shared types
        run: cd packages/shared-types && npm run typecheck

      - name: Typecheck API
        run: cd apps/api && npm run typecheck || true

      - name: Typecheck Worker
        run: cd apps/worker && npm run typecheck

      - name: Lint Web
        run: cd apps/web && npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared-types
        run: npm run build:shared

      - name: Run API tests
        run: cd apps/api && npm test || echo "No tests configured yet"
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service: [web, api, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/scrape-${{ matrix.service }}:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/scrape-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-images:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    needs: build-images
    strategy:
      matrix:
        service: [web, api, worker]
    steps:
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.REGISTRY_URL }}/scrape-${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0

name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm install
      
      - name: Typecheck shared-types
        run: cd packages/shared-types && npm run typecheck || true
      
      - name: Typecheck API
        run: cd apps/api && npm run typecheck || true
      
      - name: Typecheck Worker
        run: cd apps/worker && npm run typecheck || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - run: npm install
      
      - run: npm install -D @playwright/test
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Build applications
        run: npm run build || true
      
      - name: Start API
        run: |
          cd apps/api
          npm run start:prod &
          sleep 10
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      
      - name: Start Web
        run: |
          cd apps/web
          npm run start &
          sleep 10
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
      
      - name: Run E2E tests
        run: |
          npx playwright test tests/e2e --reporter=list
        env:
          API_URL: http://localhost:4000
          WEB_URL: http://localhost:3000

  load-tests:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Run k6 load tests
        uses: grafana/k6-action@v0.3.0
        with:
          filename: tests/load/api-stress.js
        env:
          API_URL: https://api.yourapp.com

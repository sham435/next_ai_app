apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scrape-platform.fullname" . }}-worker
  labels:
    app: scrape-worker
    {{- include "scrape-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: scrape-worker
  template:
    metadata:
      labels:
        app: scrape-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              value: {{ include "scrape-platform.redisHost" . }}
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "scrape-platform.fullname" . }}-secrets
                  key: redis-password
            - name: WORKER_CONCURRENCY
              value: {{ .Values.worker.concurrency | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.worker.rateLimit.max | quote }}
            - name: RATE_LIMIT_DURATION
              value: {{ .Values.worker.rateLimit.duration | quote }}
            - name: DOWNLOAD_DIR
              value: "/app/download"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- if .Values.worker.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "scrape-platform.fullname" . }}-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "scrape-platform.fullname" . }}-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPU }}
{{- end }}

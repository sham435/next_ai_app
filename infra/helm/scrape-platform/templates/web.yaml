apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scrape-platform.fullname" . }}-web
  labels:
    app: scrape-web
    {{- include "scrape-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: scrape-web
  template:
    metadata:
      labels:
        app: scrape-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://{{ .Values.ingress.hosts.api }}"
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scrape-platform.fullname" . }}-web
  labels:
    app: scrape-web
    {{- include "scrape-platform.labels" . | nindent 4 }}
spec:
  selector:
    app: scrape-web
  ports:
    - port: 80
      targetPort: {{ .Values.web.port }}

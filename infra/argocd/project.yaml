apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: scrape-platform
  namespace: argocd
spec:
  description: Scrape Platform GitOps Project
  sourceRepos:
    - 'https://github.com/your-org/next_chat_bot.git'
  destinations:
    - namespace: scrape-system
      server: https://kubernetes.default.svc
    - namespace: scrape-staging
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: admin
      description: Full access to scrape-platform
      policies:
        - p, proj:scrape-platform:admin, applications, *, scrape-platform/*, allow
      groups:
        - scrape-platform-admins

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scrape-platform-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: scrape-platform
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: scrape-platform
  source:
    repoURL: https://github.com/your-org/next_chat_bot.git
    targetRevision: main
    path: infra/k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: scrape-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 20

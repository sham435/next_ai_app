apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scrape-platform-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: scrape-platform
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: scrape-platform
  source:
    repoURL: https://github.com/your-org/next_chat_bot.git
    targetRevision: develop
    path: infra/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: scrape-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10

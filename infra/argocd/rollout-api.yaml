# Argo Rollouts - Canary deployment for API
# Requires: kubectl apply -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: scrape-api-rollout
  namespace: scrape-system
  labels:
    app: scrape-api
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: scrape-api
  template:
    metadata:
      labels:
        app: scrape-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          image: scrape-api:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrape-secrets
                  key: redis-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
  strategy:
    canary:
      canaryService: scrape-api-canary
      stableService: scrape-api-stable
      steps:
        - setWeight: 10
        - pause: { duration: 60s }
        - setWeight: 30
        - pause: { duration: 120s }
        - setWeight: 50
        - pause: { duration: 120s }
        - setWeight: 80
        - pause: { duration: 60s }
        - setWeight: 100
      analysis:
        templates:
          - templateName: scrape-api-success-rate
        startingStep: 2
        args:
          - name: service-name
            value: scrape-api-canary
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: scrape-api-success-rate
  namespace: scrape-system
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[5m]))
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-api-canary
  namespace: scrape-system
spec:
  selector:
    app: scrape-api
  ports:
    - port: 80
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-api-stable
  namespace: scrape-system
spec:
  selector:
    app: scrape-api
  ports:
    - port: 80
      targetPort: 4000

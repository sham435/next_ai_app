apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scrape-ingress
  namespace: scrape-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "60"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - scrape.example.com
        - api.scrape.example.com
      secretName: scrape-tls
  rules:
    - host: scrape.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scrape-web
                port:
                  number: 80
    - host: api.scrape.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scrape-api
                port:
                  number: 80

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scrape-api-hpa
  namespace: scrape-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scrape-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scrape-worker-hpa
  namespace: scrape-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scrape-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrape-api
  namespace: scrape-system
  labels:
    app: scrape-api
    app.kubernetes.io/part-of: scrape-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scrape-api
  template:
    metadata:
      labels:
        app: scrape-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: scrape-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: scrape-api:latest
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrape-secrets
                  key: redis-password
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: scrape-config
                  key: frontend-url
            - name: BULL_BOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrape-secrets
                  key: bull-board-password
            - name: DOWNLOAD_DIR
              value: "/app/download"
            - name: REQUEST_TIMEOUT
              value: "10000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: download-volume
              mountPath: /app/download
      volumes:
        - name: download-volume
          persistentVolumeClaim:
            claimName: download-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-api
  namespace: scrape-system
spec:
  selector:
    app: scrape-api
  ports:
    - port: 80
      targetPort: 4000
      name: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: download-pvc
  namespace: scrape-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scrape-api-sa
  namespace: scrape-system

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrape-web
  namespace: scrape-system
  labels:
    app: scrape-web
    app.kubernetes.io/part-of: scrape-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scrape-web
  template:
    metadata:
      labels:
        app: scrape-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: web
          image: scrape-web:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: scrape-config
                  key: api-url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-web
  namespace: scrape-system
spec:
  selector:
    app: scrape-web
  ports:
    - port: 80
      targetPort: 3000
      name: http

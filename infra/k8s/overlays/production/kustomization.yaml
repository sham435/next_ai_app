apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scrape-system

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: scrape-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: scrape-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
  - target:
      kind: Deployment
      name: scrape-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

configMapGenerator:
  - name: scrape-config
    behavior: replace
    literals:
      - frontend-url=https://scrape.example.com
      - api-url=https://api.scrape.example.com

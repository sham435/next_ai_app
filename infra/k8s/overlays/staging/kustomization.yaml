apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scrape-staging

resources:
  - ../../base

namePrefix: staging-

patches:
  - target:
      kind: Deployment
      name: scrape-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: scrape-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: scrape-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: scrape-api-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: scrape-worker-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5

configMapGenerator:
  - name: scrape-config
    behavior: replace
    literals:
      - frontend-url=https://staging.scrape.example.com
      - api-url=https://staging-api.scrape.example.com

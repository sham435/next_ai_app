version: '3.8'

services:
  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-scrapedev}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-scrapedev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scrape_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Redis Commander (UI for Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-scrapedev}
    depends_on:
      redis:
        condition: service_healthy

  # API Service
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-scrapedev}
      - DOWNLOAD_DIR=/app/download
      - REQUEST_TIMEOUT=10000
      - BULL_BOARD_PASSWORD=${BULL_BOARD_PASSWORD:-admin123}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/scrape_platform
      - STORAGE_S3_ENDPOINT=http://minio:9000
      - STORAGE_S3_ACCESS_KEY_ID=minioadmin
      - STORAGE_S3_SECRET_ACCESS_KEY=minioadmin
      - STORAGE_S3_BUCKET=scrape-platform
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - download-data:/app/download

  # Worker Service
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-scrapedev}
      - WORKER_CONCURRENCY=5
      - RATE_LIMIT_MAX=50
      - RATE_LIMIT_DURATION=60000
      - DOWNLOAD_DIR=/app/download
      - REQUEST_TIMEOUT=10000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/scrape_platform
      - STORAGE_S3_ENDPOINT=http://minio:9000
      - STORAGE_S3_ACCESS_KEY_ID=minioadmin
      - STORAGE_S3_SECRET_ACCESS_KEY=minioadmin
      - STORAGE_S3_BUCKET=scrape-platform
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - download-data:/app/download
    deploy:
      replicas: 2

  # Web Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  redis-data:
  postgres-data:
  minio-data:
  download-data:
